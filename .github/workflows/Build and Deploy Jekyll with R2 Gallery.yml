- name: Generate gallery from R2
  env:
    R2_ACCOUNT_ID: $
    R2_ACCESS_KEY_ID: $
    R2_SECRET_ACCESS_KEY: $
    R2_BUCKET_NAME: $
    R2_PUBLIC_URL: $
    AWS_ACCESS_KEY_ID: $
    AWS_SECRET_ACCESS_KEY: $
    AWS_DEFAULT_REGION: auto
  run: |
    pip install awscli --quiet
    bash scripts/generate-gallery-r2.sh
