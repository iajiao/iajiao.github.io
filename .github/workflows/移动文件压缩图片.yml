name: Move, Compress and Organize Notes and Images

on:
  push:
    branches:
      - master
    paths:
      - '**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '**/*.webp'

jobs:
  organize-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move markdown files to _posts
        run: |
          mkdir -p _posts
          find . -maxdepth 2 -type f -name "*.md" \
            ! -path "./_posts/*" \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            -exec mv {} ./_posts/ \;

      - name: Move images to img/in-post (temporary location)
        run: |
          mkdir -p img/in-post
          find . -maxdepth 2 -type f \( \
            -name "*.png" -o \
            -name "*.jpg" -o \
            -name "*.jpeg" -o \
            -name "*.gif" -o \
            -name "*.svg" -o \
            -name "*.webp" \) \
            ! -path "./_posts/*" \
            ! -path "./img/*" \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            -exec mv {} ./temp_images/ \;

      - name: Compress images with squoosh
        uses: szenius/squoosh-action@v1
        with:
          # 输入目录（临时存放的图片）
          inputDir: './temp_images'
          # 输出目录（压缩后的图片）
          outputDir: './img/in-post'
          # 压缩配置
          options: |
            {
              "jpg": {
                "quality": 80
              },
              "jpeg": {
                "quality": 80
              },
              "png": {
                "quality": 80
              },
              "webp": {
                "quality": 80
              }
            }
      
      - name: Clean up temporary directory
        run: |
          rm -rf ./temp_images

      - name: Clean up empty directories
        run: |
          find . -type d -empty -delete 2>/dev/null || true

      - name: Update image links in markdown files
        run: |
          cd _posts
          for file in *.md; do
            if [ -f "$file" ]; then
              # 替换图片链接为相对路径指向 img/in-post
              sed -i 's|![](\([^/)]*\.\(png\|jpg\|jpeg\|gif\|svg\|webp\)\)|![](../img/in-post/\1|g' "$file"
              sed -i 's|![](\./\([^)]*\.\(png\|jpg\|jpeg\|gif\|svg\|webp\)\)|![](../img/in-post/\1|g' "$file"
            fi
          done
          cd ..

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: organize, compress and move notes & images"
          git push
