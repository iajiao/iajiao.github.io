<style>
/* ========== 基础变量 ========== */
:root {
  --primary: #007aff;
  --primary-gradient: linear-gradient(135deg, #007aff, #5856d6);
  --text-dark: #1a1a1a;
  --text-light: #888;
}

/* ========== 瀑布流容器 ========== */
.waterfall {
  display: flex;
  flex-direction: row;
  gap: 20px;
  align-items: flex-start;
}

.waterfall-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.waterfall-item {
  break-inside: avoid;
  cursor: pointer;
  transition: all 0.25s ease;
  width: 100%;
}

.waterfall-item img,
.waterfall-item video {
  width: 100%;
  border-radius: 8px;
  display: block;
  transition: transform 0.2s;
}

.waterfall-item:hover img,
.waterfall-item:hover video {
  transform: scale(1.02);
}

/* ========== 加载更多按钮 ========== */
.load-more-btn {
  text-align: center;
  margin: 40px 0 60px;
}

.load-more-btn button {
  background: var(--primary-gradient);
  border: none;
  color: white;
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 500;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 2px 8px rgba(0,122,255,0.3);
}

.load-more-btn button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,122,255,0.4);
}

.loading-indicator, .end-message {
  text-align: center;
  margin: 40px 0;
  color: #bbb;
}

/* ========== Lightbox ========== */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.lightbox.active { display: flex; }

.lightbox-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  max-width: 90vw;
  max-height: 90vh;
  z-index: 1002;
}

.lightbox-content {
  display: flex;
  justify-content: center;
  align-items: center;
}

.lightbox-content img,
.lightbox-content video {
  max-width: 85vw;
  max-height: 80vh;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  cursor: default;
}

/* 计数器 - 在图片正下方外部 */
.image-counter {
  margin-top: 16px;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", sans-serif;
  text-align: center;
  background: transparent;
  padding: 0;
}

/* 左右导航区域 */
.lightbox-prev, .lightbox-next {
  position: absolute;
  top: 0;
  height: 100%;
  width: 25%;
  cursor: pointer;
  z-index: 1001;
  display: flex;
  align-items: center;
  transition: background 0.2s ease;
}

.lightbox-prev { left: 0; justify-content: flex-start; padding-left: 20px; }
.lightbox-next { right: 0; justify-content: flex-end; padding-right: 20px; }

.lightbox-prev:hover { background: linear-gradient(90deg, rgba(0,0,0,0.3), transparent); }
.lightbox-next:hover { background: linear-gradient(-90deg, rgba(0,0,0,0.3), transparent); }

.nav-arrow {
  font-size: 48px;
  color: rgba(255,255,255,0.7);
  opacity: 0;
  transition: opacity 0.2s ease;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.lightbox-prev:hover .nav-arrow, .lightbox-next:hover .nav-arrow {
  opacity: 1;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 44px;
  color: white;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 1002;
  opacity: 0.8;
  transition: opacity 0.2s;
}

.lightbox-close:hover { opacity: 1; }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .waterfall {
    gap: 12px;
  }
  .waterfall-col {
    gap: 12px;
  }
  .lightbox-prev, .lightbox-next {
    width: 20%;
  }
  .nav-arrow {
    font-size: 36px;
    opacity: 0.5;
  }
  .lightbox-content img,
  .lightbox-content video {
    max-height: 70vh;
  }
  .image-counter {
    margin-top: 12px;
    font-size: 12px;
  }
}

@media (max-width: 480px) {
  .waterfall {
    flex-direction: column;
  }
}
</style>

<!-- 瀑布流容器 -->
<div id="waterfallContainer" class="waterfall"></div>

<!-- 加载更多 -->
<div id="loadMoreBtn" class="load-more-btn" style="display: none;">
  <button onclick="loadMore()">📷 加载更多照片</button>
</div>
<div id="loadingIndicator" class="loading-indicator" style="display: none;">⏳ 加载中...</div>
<div id="endMessage" class="end-message" style="display: none;">✨ 已经到底了 ✨</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-prev" onclick="event.stopPropagation(); prevImage()">
    <span class="nav-arrow">‹</span>
  </div>
  <div class="lightbox-container">
    <div id="lightboxContent" class="lightbox-content"></div>
    <div id="imageCounter" class="image-counter"></div>
  </div>
  <div class="lightbox-next" onclick="event.stopPropagation(); nextImage()">
    <span class="nav-arrow">›</span>
  </div>
</div>

<script>
// ========== 数据存储 ==========
let allPhotos = [];
let currentPage = 1;
let currentPageSize = 15;  // 动态计算的每页数量
let isLoading = false;
let hasMore = true;

let currentImageIndex = 0;
let allImagesArray = [];

// ========== 判断是否为视频 ==========
function isVideoUrl(url) {
  return /\.(mp4|mov|webm|m4v|avi|mkv)$/i.test(url);
}

// ========== 从 Jekyll 获取数据 ==========
function initPhotoData() {
  allImagesArray = [
    {% if site.data.gallery.size > 0 %}
      {% for photo in site.data.gallery %}
      {
        title: "{{ photo.title | escape }}",
        image: "{{ photo.image }}"
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    {% endif %}
  ];
  allPhotos = allImagesArray;
}

// ========== 预估图片高度（基于 URL 特征） ==========
function estimateImageHeight(url, isVideo) {
  if (isVideo) return 300;  // 视频固定高度
  
  // 根据文件名或扩展名预估比例
  const lowerUrl = url.toLowerCase();
  
  // 竖图特征：包含 portrait、vertical，或文件名有特定模式
  if (lowerUrl.includes('portrait') || lowerUrl.includes('vertical')) {
    return 500;  // 竖图较高
  }
  
  // 方图特征
  if (lowerUrl.includes('square')) {
    return 300;
  }
  
  // 默认横图比例（16:9 或 4:3）
  return 280;
}

// ========== 动态计算最佳每页数量 ==========
function calculateOptimalPageSize(photos, columnCount = 3) {
  const MIN_SIZE = 6;      // 最少6张（每列2张）
  const MAX_SIZE = 24;     // 最多24张（每列8张）
  const THRESHOLD = 120;   // 高度差阈值（px）
  
  if (photos.length <= MIN_SIZE) return photos.length;
  
  let colHeights = new Array(columnCount).fill(0);
  let bestSize = MIN_SIZE;
  
  for (let i = 0; i < Math.min(photos.length, MAX_SIZE); i++) {
    const photo = photos[i];
    const isVideo = isVideoUrl(photo.image);
    const height = estimateImageHeight(photo.image, isVideo);
    
    // 找到当前最短列
    let shortestCol = 0;
    for (let j = 1; j < columnCount; j++) {
      if (colHeights[j] < colHeights[shortestCol]) {
        shortestCol = j;
      }
    }
    colHeights[shortestCol] += height;
    
    // 检查高度差
    const maxH = Math.max(...colHeights);
    const minH = Math.min(...colHeights);
    const diff = maxH - minH;
    
    if (diff > THRESHOLD && i >= MIN_SIZE) {
      // 高度差过大，停止在当前 i
      bestSize = i;
      break;
    }
    bestSize = i + 1;
  }
  
  // 确保返回值在范围内
  return Math.max(MIN_SIZE, Math.min(MAX_SIZE, bestSize));
}

// ========== 渲染瀑布流（动态分配到最短列） ==========
function renderWaterfall(page) {
  // 获取列数（响应式）
  let columnCount = 3;
  if (window.innerWidth <= 480) {
    columnCount = 1;
  } else if (window.innerWidth <= 768) {
    columnCount = 2;
  }
  
  // 动态计算当前页的最佳数量
  if (page === 1) {
    currentPageSize = calculateOptimalPageSize(allPhotos, columnCount);
    console.log(`动态计算第一页数量: ${currentPageSize} 张（列数: ${columnCount}）`);
  }
  
  const end = page * currentPageSize;
  const photosToShow = allPhotos.slice(0, end);
  const container = document.getElementById('waterfallContainer');
  
  container.innerHTML = '';
  
  if (photosToShow.length === 0) return;
  
  // 创建列容器
  const columns = [];
  const columnHeights = new Array(columnCount).fill(0);
  
  for (let i = 0; i < columnCount; i++) {
    const col = document.createElement('div');
    col.className = 'waterfall-col';
    columns.push(col);
    container.appendChild(col);
  }
  
  // 找到当前总高度最短的列
  function getShortestColumnIndex() {
    let shortest = 0;
    for (let i = 1; i < columnCount; i++) {
      if (columnHeights[i] < columnHeights[shortest]) {
        shortest = i;
      }
    }
    return shortest;
  }
  
  // 分配元素到最短列
  function assignToColumn(item, height) {
    const colIndex = getShortestColumnIndex();
    columns[colIndex].appendChild(item);
    columnHeights[colIndex] += height;
  }
  
  let pendingCount = photosToShow.length;
  let processedCount = 0;
  
  photosToShow.forEach((photo, idx) => {
    const item = document.createElement('div');
    item.className = 'waterfall-item';
    const url = photo.image;
    const isVideo = isVideoUrl(url);
    
    if (isVideo) {
      const video = document.createElement('video');
      video.src = url;
      video.autoplay = true;
      video.muted = true;
      video.loop = true;
      video.playsInline = true;
      video.preload = 'metadata';
      video.style.width = '100%';
      video.style.display = 'block';
      item.onclick = (e) => {
        e.stopPropagation();
        openLightbox(url, idx);
      };
      item.appendChild(video);
      assignToColumn(item, 300);
      processedCount++;
      if (processedCount === pendingCount) {
        updateButtonState(photosToShow.length, allPhotos.length);
      }
    } else {
      const img = document.createElement('img');
      img.src = url;
      img.alt = photo.title;
      img.loading = 'lazy';
      img.style.width = '100%';
      img.style.display = 'block';
      item.onclick = () => openLightbox(url, idx);
      item.appendChild(img);
      
      const onLoad = () => {
        const height = img.offsetHeight;
        assignToColumn(item, height);
        processedCount++;
        if (processedCount === pendingCount) {
          updateButtonState(photosToShow.length, allPhotos.length);
        }
      };
      if (img.complete) {
        onLoad();
      } else {
        img.addEventListener('load', onLoad);
        img.addEventListener('error', onLoad);
      }
    }
  });
  
  function updateButtonState(currentCount, totalCount) {
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const endMessage = document.getElementById('endMessage');
    
    if (currentCount >= totalCount) {
      hasMore = false;
      loadMoreBtn.style.display = 'none';
      endMessage.style.display = 'block';
    } else {
      hasMore = true;
      loadMoreBtn.style.display = 'block';
      endMessage.style.display = 'none';
    }
  }
}

// ========== 加载更多 ==========
function loadMore() {
  if (isLoading || !hasMore) return;
  
  isLoading = true;
  const loadingIndicator = document.getElementById('loadingIndicator');
  loadingIndicator.style.display = 'block';
  
  setTimeout(() => {
    currentPage++;
    renderWaterfall(currentPage);
    isLoading = false;
    loadingIndicator.style.display = 'none';
  }, 200);
}

// ========== Lightbox 功能 ==========
function openLightbox(url, index) {
  const lb = document.getElementById('lightbox');
  const contentDiv = document.getElementById('lightboxContent');
  const counter = document.getElementById('imageCounter');
  
  currentImageIndex = index;
  const isVideo = isVideoUrl(url);
  
  contentDiv.innerHTML = '';
  
  if (isVideo) {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    video.autoplay = true;
    video.playsInline = true;
    video.style.maxWidth = '85vw';
    video.style.maxHeight = '80vh';
    video.style.width = 'auto';
    video.style.height = 'auto';
    video.style.borderRadius = '8px';
    contentDiv.appendChild(video);
  } else {
    const img = document.createElement('img');
    img.src = url;
    img.alt = '';
    img.style.maxWidth = '85vw';
    img.style.maxHeight = '80vh';
    img.style.width = 'auto';
    img.style.height = 'auto';
    img.style.borderRadius = '8px';
    img.style.cursor = 'default';
    contentDiv.appendChild(img);
  }
  
  if (counter && allImagesArray.length > 0) {
    counter.textContent = `${index + 1} / ${allImagesArray.length}`;
  }
  
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  const contentDiv = document.getElementById('lightboxContent');
  
  const video = contentDiv.querySelector('video');
  if (video) {
    video.pause();
  }
  
  lb.classList.remove('active');
  document.body.style.overflow = '';
}

function nextImage() {
  if (currentImageIndex < allImagesArray.length - 1) {
    currentImageIndex++;
    const nextUrl = allImagesArray[currentImageIndex].image;
    openLightbox(nextUrl, currentImageIndex);
  }
}

function prevImage() {
  if (currentImageIndex > 0) {
    currentImageIndex--;
    const prevUrl = allImagesArray[currentImageIndex].image;
    openLightbox(prevUrl, currentImageIndex);
  }
}

// ========== 键盘支持 ==========
document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  
  if (e.key === 'Escape') {
    closeLightbox();
  } else if (e.key === 'ArrowLeft') {
    prevImage();
  } else if (e.key === 'ArrowRight') {
    nextImage();
  }
});

// ========== 窗口大小改变时重新计算 ==========
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (document.getElementById('waterfallContainer').children.length > 0) {
      // 重置页码，重新计算第一页数量
      currentPage = 1;
      renderWaterfall(1);
    }
  }, 250);
});

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
  initPhotoData();
  
  if (allPhotos.length === 0) {
    document.getElementById('waterfallContainer').innerHTML = '<p style="text-align:center;">📷 暂无照片或视频，请在 R2 上传后运行 Workflow</p>';
    return;
  }
  
  renderWaterfall(1);
});
</script>
