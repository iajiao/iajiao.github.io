---
layout: gallery
title: "Pics"
description: "「喜欢的，热爱的，欣赏的……」"
header-img: "img/home-bg-pics.jpg"
permalink: /gallery/
---

<style>
/* ========== 基础变量 ========== */
:root {
  --primary: #007aff;
  --primary-gradient: linear-gradient(135deg, #007aff, #5856d6);
  --text-dark: #1a1a1a;
  --text-light: #888;
}

/* ========== 瀑布流 ========== */
.waterfall {
  column-count: 3;
  column-gap: 20px;
}

.waterfall-item {
  break-inside: avoid;
  margin-bottom: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.waterfall-item img {
  width: 100%;
  border-radius: 8px;
  display: block;
  transition: transform 0.2s;
}

.waterfall-item:hover img {
  transform: scale(1.02);
}

/* ========== 加载更多按钮 ========== */
.load-more-btn {
  text-align: center;
  margin: 40px 0 60px;
}

.load-more-btn button {
  background: var(--primary-gradient);
  border: none;
  color: white;
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 500;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 2px 8px rgba(0,122,255,0.3);
}

.load-more-btn button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,122,255,0.4);
}

.loading-indicator, .end-message {
  text-align: center;
  margin: 40px 0;
  color: #bbb;
}

/* ========== Lightbox ========== */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.lightbox.active { display: flex; }

.lightbox img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 8px;
  z-index: 1002;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  cursor: default;
}

/* 左右导航区域 */
.lightbox-prev, .lightbox-next {
  position: absolute;
  top: 0;
  height: 100%;
  width: 25%;
  cursor: pointer;
  z-index: 1001;
  display: flex;
  align-items: center;
  transition: background 0.2s ease;
}

.lightbox-prev { left: 0; justify-content: flex-start; padding-left: 20px; }
.lightbox-next { right: 0; justify-content: flex-end; padding-right: 20px; }

.lightbox-prev:hover { background: linear-gradient(90deg, rgba(0,0,0,0.3), transparent); }
.lightbox-next:hover { background: linear-gradient(-90deg, rgba(0,0,0,0.3), transparent); }

.nav-arrow {
  font-size: 48px;
  color: rgba(255,255,255,0.7);
  opacity: 0;
  transition: opacity 0.2s ease;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.lightbox-prev:hover .nav-arrow, .lightbox-next:hover .nav-arrow {
  opacity: 1;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 44px;
  color: white;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 1002;
  opacity: 0.8;
  transition: opacity 0.2s;
}

.lightbox-close:hover { opacity: 1; }

.image-counter {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 6px 14px;
  border-radius: 30px;
  color: white;
  font-size: 13px;
  font-family: monospace;
  z-index: 1002;
  pointer-events: none;
}

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .waterfall { column-count: 2; gap: 12px; margin-top: 20px; }
}
@media (max-width: 480px) {
  .waterfall { column-count: 1; margin-top: 20px; }
}
</style>

<!-- 瀑布流容器 -->
<div id="waterfallContainer" class="waterfall"></div>

<!-- 加载更多 -->
<div id="loadMoreBtn" class="load-more-btn" style="display: none;">
  <button onclick="loadMore()">📷 加载更多照片</button>
</div>
<div id="loadingIndicator" class="loading-indicator" style="display: none;">⏳ 加载中...</div>
<div id="endMessage" class="end-message" style="display: none;">✨ 已经到底了 ✨</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-prev" onclick="event.stopPropagation(); prevImage()">
    <span class="nav-arrow">‹</span>
  </div>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
  <div class="lightbox-next" onclick="event.stopPropagation(); nextImage()">
    <span class="nav-arrow">›</span>
  </div>
  <div id="imageCounter" class="image-counter"></div>
</div>

<script>
// ========== 数据存储 ==========
let allPhotos = [];      // 所有照片数据（已按时间倒序排列）
let currentPage = 1;     // 当前页码
const pageSize = 20;      // 每页显示数量
let isLoading = false;    // 是否正在加载
let hasMore = true;       // 是否还有更多

// Lightbox 相关
let currentImageIndex = 0;
let allImagesArray = [];

// ========== 从 Jekyll 获取数据 ==========
function initPhotoData() {
  allImagesArray = [
    {% if site.data.gallery.size > 0 %}
      {% for photo in site.data.gallery %}
      {
        title: "{{ photo.title | escape }}",
        image: "{{ photo.image }}"
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    {% endif %}
  ];
  allPhotos = allImagesArray;
}

// ========== 渲染瀑布流（分页，从新到旧） ==========
function renderWaterfall(page) {
  const end = page * pageSize;
  const photosToShow = allPhotos.slice(0, end);
  const container = document.getElementById('waterfallContainer');
  
  container.innerHTML = '';
  
  photosToShow.forEach((photo, idx) => {
    const item = document.createElement('div');
    item.className = 'waterfall-item';
    item.onclick = () => openLightbox(photo.image, idx);
    const img = document.createElement('img');
    img.src = photo.image;
    img.alt = photo.title;
    img.loading = 'lazy';
    item.appendChild(img);
    container.appendChild(item);
  });
  
  // 更新按钮状态
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const endMessage = document.getElementById('endMessage');
  
  if (photosToShow.length >= allPhotos.length) {
    hasMore = false;
    loadMoreBtn.style.display = 'none';
    endMessage.style.display = 'block';
  } else {
    hasMore = true;
    loadMoreBtn.style.display = 'block';
    endMessage.style.display = 'none';
  }
}

// ========== 加载更多 ==========
function loadMore() {
  if (isLoading || !hasMore) return;
  
  isLoading = true;
  const loadingIndicator = document.getElementById('loadingIndicator');
  loadingIndicator.style.display = 'block';
  
  setTimeout(() => {
    currentPage++;
    renderWaterfall(currentPage);
    isLoading = false;
    loadingIndicator.style.display = 'none';
  }, 200);
}

// ========== Lightbox 功能 ==========
function openLightbox(url, index) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('imageCounter');
  
  img.src = url;
  currentImageIndex = index;
  
  if (counter && allImagesArray.length > 0) {
    counter.textContent = `${index + 1} / ${allImagesArray.length}`;
  }
  
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function nextImage() {
  if (currentImageIndex < allImagesArray.length - 1) {
    currentImageIndex++;
    const img = document.getElementById('lightboxImg');
    const counter = document.getElementById('imageCounter');
    img.src = allImagesArray[currentImageIndex].image;
    if (counter) {
      counter.textContent = `${currentImageIndex + 1} / ${allImagesArray.length}`;
    }
  }
}

function prevImage() {
  if (currentImageIndex > 0) {
    currentImageIndex--;
    const img = document.getElementById('lightboxImg');
    const counter = document.getElementById('imageCounter');
    img.src = allImagesArray[currentImageIndex].image;
    if (counter) {
      counter.textContent = `${currentImageIndex + 1} / ${allImagesArray.length}`;
    }
  }
}

// ========== 键盘支持 ==========
document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  
  if (e.key === 'Escape') {
    closeLightbox();
  } else if (e.key === 'ArrowLeft') {
    prevImage();
  } else if (e.key === 'ArrowRight') {
    nextImage();
  }
});

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
  initPhotoData();
  
  if (allPhotos.length === 0) {
    document.getElementById('waterfallContainer').innerHTML = '<p style="text-align:center;">📷 暂无照片，请在 R2 上传图片后运行 Workflow</p>';
    return;
  }
  
  // 直接渲染瀑布流（第一页，从新到旧）
  renderWaterfall(1);
});
</script>
