---
layout: gallery
title: "Pics"
description: "「喜欢的，热爱的，欣赏的……」"
header-img: "img/home-bg-pics.jpg"
permalink: /gallery/
---

<style>
/* ========== 基础变量 ========== */
:root {
  --primary: #007aff;
  --primary-gradient: linear-gradient(135deg, #007aff, #5856d6);
  --text-dark: #1a1a1a;
  --text-light: #888;
}

/* ========== 瀑布流 ========== */
.waterfall {
  column-count: 3;
  column-gap: 20px;
}

.waterfall-item {
  break-inside: avoid;
  margin-bottom: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.waterfall-item img,
.waterfall-item video {
  width: 100%;
  border-radius: 8px;
  display: block;
  transition: transform 0.2s;
}

.waterfall-item:hover img,
.waterfall-item:hover video {
  transform: scale(1.02);
}

/* 视频静音指示器（可选） */
.video-mute-icon {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
  padding: 4px 8px;
  font-size: 10px;
  color: white;
  pointer-events: none;
  z-index: 1;
}

/* ========== 加载更多按钮 ========== */
.load-more-btn {
  text-align: center;
  margin: 40px 0 60px;
}

.load-more-btn button {
  background: var(--primary-gradient);
  border: none;
  color: white;
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 500;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 2px 8px rgba(0,122,255,0.3);
}

.load-more-btn button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,122,255,0.4);
}

.loading-indicator, .end-message {
  text-align: center;
  margin: 40px 0;
  color: #bbb;
}

/* ========== Lightbox ========== */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.lightbox.active { display: flex; }

.lightbox img,
.lightbox video {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
  z-index: 1002;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  cursor: default;
}

/* 左右导航区域 */
.lightbox-prev, .lightbox-next {
  position: absolute;
  top: 0;
  height: 100%;
  width: 25%;
  cursor: pointer;
  z-index: 1001;
  display: flex;
  align-items: center;
  transition: background 0.2s ease;
}

.lightbox-prev { left: 0; justify-content: flex-start; padding-left: 20px; }
.lightbox-next { right: 0; justify-content: flex-end; padding-right: 20px; }

.lightbox-prev:hover { background: linear-gradient(90deg, rgba(0,0,0,0.3), transparent); }
.lightbox-next:hover { background: linear-gradient(-90deg, rgba(0,0,0,0.3), transparent); }

.nav-arrow {
  font-size: 48px;
  color: rgba(255,255,255,0.7);
  opacity: 0;
  transition: opacity 0.2s ease;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.lightbox-prev:hover .nav-arrow, .lightbox-next:hover .nav-arrow {
  opacity: 1;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 44px;
  color: white;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 1002;
  opacity: 0.8;
  transition: opacity 0.2s;
}

.lightbox-close:hover { opacity: 1; }

.image-counter {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 6px 14px;
  border-radius: 30px;
  color: white;
  font-size: 13px;
  font-family: monospace;
  z-index: 1002;
  pointer-events: none;
}

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .waterfall { column-count: 2; gap: 12px; margin-top: 20px; }
  .lightbox-prev, .lightbox-next { width: 20%; }
  .nav-arrow { font-size: 36px; opacity: 0.5; }
}
@media (max-width: 480px) {
  .waterfall { column-count: 1; margin-top: 20px; }
}
</style>

<!-- 瀑布流容器 -->
<div id="waterfallContainer" class="waterfall"></div>

<!-- 加载更多 -->
<div id="loadMoreBtn" class="load-more-btn" style="display: none;">
  <button onclick="loadMore()">📷 加载更多照片</button>
</div>
<div id="loadingIndicator" class="loading-indicator" style="display: none;">⏳ 加载中...</div>
<div id="endMessage" class="end-message" style="display: none;">✨ 已经到底了 ✨</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-prev" onclick="event.stopPropagation(); prevImage()">
    <span class="nav-arrow">‹</span>
  </div>
  <div id="lightboxContent" class="lightbox-content">
    <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
  </div>
  <div class="lightbox-next" onclick="event.stopPropagation(); nextImage()">
    <span class="nav-arrow">›</span>
  </div>
  <div id="imageCounter" class="image-counter"></div>
</div>

<script>
// ========== 数据存储 ==========
let allPhotos = [];
let currentPage = 1;
const pageSize = 20;
let isLoading = false;
let hasMore = true;

let currentImageIndex = 0;
let allImagesArray = [];
let currentMediaIsVideo = false;

// ========== 判断是否为视频 ==========
function isVideoUrl(url) {
  return /\.(mp4|mov|webm|m4v|avi|mkv)$/i.test(url);
}

// ========== 从 Jekyll 获取数据 ==========
function initPhotoData() {
  allImagesArray = [
    {% if site.data.gallery.size > 0 %}
      {% for photo in site.data.gallery %}
      {
        title: "{{ photo.title | escape }}",
        image: "{{ photo.image }}"
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    {% endif %}
  ];
  allPhotos = allImagesArray;
}

// ========== 渲染瀑布流 ==========
function renderWaterfall(page) {
  const end = page * pageSize;
  const photosToShow = allPhotos.slice(0, end);
  const container = document.getElementById('waterfallContainer');
  
  container.innerHTML = '';
  
  photosToShow.forEach((photo, idx) => {
    const item = document.createElement('div');
    item.className = 'waterfall-item';
    const url = photo.image;
    const isVideo = isVideoUrl(url);
    
    if (isVideo) {
      // 视频：静音循环自动播放
      const video = document.createElement('video');
      video.src = url;
      video.autoplay = true;
      video.muted = true;
      video.loop = true;
      video.playsInline = true;
      video.preload = 'metadata';
      video.style.width = '100%';
      video.style.display = 'block';
      // 点击视频打开 Lightbox
      item.onclick = (e) => {
        e.stopPropagation();
        openLightbox(url, idx);
      };
      item.appendChild(video);
    } else {
      // 图片
      const img = document.createElement('img');
      img.src = url;
      img.alt = photo.title;
      img.loading = 'lazy';
      img.style.width = '100%';
      img.style.display = 'block';
      item.onclick = () => openLightbox(url, idx);
      item.appendChild(img);
    }
    
    container.appendChild(item);
  });
  
  // 更新按钮状态
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const endMessage = document.getElementById('endMessage');
  
  if (photosToShow.length >= allPhotos.length) {
    hasMore = false;
    loadMoreBtn.style.display = 'none';
    endMessage.style.display = 'block';
  } else {
    hasMore = true;
    loadMoreBtn.style.display = 'block';
    endMessage.style.display = 'none';
  }
}

// ========== 加载更多 ==========
function loadMore() {
  if (isLoading || !hasMore) return;
  
  isLoading = true;
  const loadingIndicator = document.getElementById('loadingIndicator');
  loadingIndicator.style.display = 'block';
  
  setTimeout(() => {
    currentPage++;
    renderWaterfall(currentPage);
    isLoading = false;
    loadingIndicator.style.display = 'none';
  }, 200);
}

// ========== Lightbox 功能（支持视频） ==========
function openLightbox(url, index) {
  const lb = document.getElementById('lightbox');
  const contentDiv = document.getElementById('lightboxContent');
  const counter = document.getElementById('imageCounter');
  
  currentImageIndex = index;
  const isVideo = isVideoUrl(url);
  currentMediaIsVideo = isVideo;
  
  // 清空内容，根据类型创建新元素
  contentDiv.innerHTML = '';
  
  if (isVideo) {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    video.autoplay = true;
    video.playsInline = true;
    video.style.maxWidth = '90%';
    video.style.maxHeight = '90%';
    video.style.borderRadius = '8px';
    contentDiv.appendChild(video);
  } else {
    const img = document.createElement('img');
    img.src = url;
    img.alt = '';
    img.style.maxWidth = '90%';
    img.style.maxHeight = '90%';
    img.style.borderRadius = '8px';
    img.style.cursor = 'default';
    contentDiv.appendChild(img);
  }
  
  if (counter && allImagesArray.length > 0) {
    counter.textContent = `${index + 1} / ${allImagesArray.length}`;
  }
  
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  const contentDiv = document.getElementById('lightboxContent');
  
  // 停止视频播放
  const video = contentDiv.querySelector('video');
  if (video) {
    video.pause();
  }
  
  lb.classList.remove('active');
  document.body.style.overflow = '';
}

function nextImage() {
  if (currentImageIndex < allImagesArray.length - 1) {
    currentImageIndex++;
    const nextUrl = allImagesArray[currentImageIndex].image;
    openLightbox(nextUrl, currentImageIndex);
  }
}

function prevImage() {
  if (currentImageIndex > 0) {
    currentImageIndex--;
    const prevUrl = allImagesArray[currentImageIndex].image;
    openLightbox(prevUrl, currentImageIndex);
  }
}

// ========== 键盘支持 ==========
document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  
  if (e.key === 'Escape') {
    closeLightbox();
  } else if (e.key === 'ArrowLeft') {
    prevImage();
  } else if (e.key === 'ArrowRight') {
    nextImage();
  }
});

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
  initPhotoData();
  
  if (allPhotos.length === 0) {
    document.getElementById('waterfallContainer').innerHTML = '<p style="text-align:center;">📷 暂无照片或视频，请在 R2 上传后运行 Workflow</p>';
    return;
  }
  
  renderWaterfall(1);
});
</script>
